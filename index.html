<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hub do Time — Fortes Suporte & CS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root{
  --green:#1a7a4a;--green-light:#e8f5ee;--green-mid:#2ea868;
  --gray-50:#f8f9fa;--gray-100:#f1f3f5;--gray-200:#e9ecef;
  --gray-400:#adb5bd;--gray-600:#6c757d;--gray-800:#343a40;--gray-900:#212529;
  --border:#dee2e6;--white:#ffffff;
  --danger:#e03131;--danger-light:#fff5f5;
  --warning:#e67700;--warning-light:#fff9db;
  --info:#1971c2;--info-light:#e7f5ff;
  --purple:#6741d9;--purple-light:#f3eefe;
  --brand:#c1121f;--brand-light:#fdecea;--brand-dark:#8f0e17;
  --radius:8px;--radius-lg:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--gray-50);color:var(--gray-900);font-size:14px}
.app{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--gray-900);flex-shrink:0;display:flex;flex-direction:column}
.sidebar-logo{padding:18px 16px 16px;background:var(--gray-900);border-bottom:1px solid rgba(255,255,255,0.08)}
.sidebar-logo h1{font-size:15px;font-weight:600;color:#fff;letter-spacing:-0.3px}
.sidebar-logo p{font-size:11px;color:var(--brand);margin-top:2px;font-weight:700}
.sidebar-nav{padding:12px 8px;flex:1}
.nav-section{font-size:10px;font-weight:600;color:rgba(255,255,255,0.25);text-transform:uppercase;letter-spacing:.06em;padding:12px 10px 4px;margin-top:4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--radius);cursor:pointer;color:rgba(255,255,255,0.55);font-size:13px;font-weight:500;transition:all .15s;margin-bottom:2px}
.nav-item:hover{background:rgba(103,65,217,0.12);color:rgba(255,255,255,0.9)}
.nav-item.active{background:var(--brand);color:#fff}
.nav-item i{font-size:17px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-size:16px;font-weight:600;color:var(--gray-900)}
.topbar-actions{display:flex;gap:8px;align-items:center}
.content{flex:1;padding:24px;overflow-y:auto}

.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--white);color:var(--gray-800);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.btn:hover{background:var(--gray-100)}
.btn-primary{background:var(--brand);border-color:var(--brand);color:#fff}
.btn-primary:hover{background:var(--brand-dark);border-color:var(--brand-dark)}
.btn-danger{background:var(--danger);border-color:var(--danger);color:#fff}
.btn-danger:hover{background:#c92a2a;border-color:#c92a2a}
.btn-sm{padding:5px 10px;font-size:12px}
.btn i{font-size:15px}

.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg)}
.card-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-header h2{font-size:14px;font-weight:600}

.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px}
.stat-label{font-size:12px;color:var(--gray-600);margin-bottom:6px}
.stat-value{font-size:28px;font-weight:700;color:var(--gray-900);line-height:1}
.stat-sub{font-size:11px;color:var(--gray-400);margin-top:4px}

.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;font-weight:600;color:var(--gray-600);text-transform:uppercase;letter-spacing:.04em;padding:10px 14px;background:var(--gray-50);border-bottom:1px solid var(--border)}
td{padding:11px 14px;border-bottom:1px solid var(--gray-100);font-size:13px;color:var(--gray-800);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--gray-50)}

.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:var(--green-light);color:var(--green)}
.badge-blue{background:var(--info-light);color:var(--info)}
.badge-yellow{background:var(--warning-light);color:var(--warning)}
.badge-gray{background:var(--gray-100);color:var(--gray-600)}
.badge-purple{background:var(--purple-light);color:var(--purple)}

.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.search-box{display:flex;align-items:center;gap:8px;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:0 12px;flex:1;min-width:180px}
.search-box i{color:var(--gray-400);font-size:16px}
.search-box input{border:none;outline:none;font-size:13px;color:var(--gray-800);width:100%;padding:8px 0;background:transparent}
select{padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;color:var(--gray-800);background:var(--white);outline:none;cursor:pointer}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border-radius:var(--radius-lg);width:500px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal-header{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:15px;font-weight:600}
.modal-body{padding:20px}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.close-btn{background:none;border:none;cursor:pointer;color:var(--gray-400);font-size:20px;padding:2px}
.close-btn:hover{color:var(--gray-800)}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--gray-600);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;color:var(--gray-900);outline:none;transition:border-color .15s;background:var(--white)}
.form-group input:focus,.form-group select:focus{border-color:var(--brand)}
.form-group textarea{resize:vertical;min-height:70px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* RESUMO */
.resumo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.resumo-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.resumo-header{padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.resumo-header.suporte{background:#eaf3fe}
.resumo-header.cs{background:#e8f5ee}
.resumo-header.suporte-cs{background:#f3eefe}
.avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.av-suporte{background:var(--info);color:#fff}
.av-cs{background:var(--green);color:#fff}
.av-suporteecs{background:var(--purple);color:#fff}
.resumo-name{font-size:13px;font-weight:600;color:var(--gray-900);line-height:1.2}
.resumo-cargo{font-size:11px;color:var(--gray-600);margin-top:2px}
.equip-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
.equip-cell{padding:8px 14px;border-bottom:1px solid var(--gray-100);border-right:1px solid var(--gray-100)}
.equip-cell:nth-child(even){border-right:none}
.equip-cell:nth-last-child(-n+2){border-bottom:none}
.equip-tipo-label{font-size:10px;color:var(--gray-400);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px;display:flex;align-items:center;gap:4px}
.equip-tipo-label i{font-size:12px}
.equip-pat-val{font-size:12px;font-weight:500;color:var(--gray-800);font-family:monospace}
.equip-pat-val.vazio{color:var(--gray-400);font-weight:400;font-style:italic;font-family:inherit}

/* COLABORADORES */
.collab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.collab-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.collab-card-header{padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.collab-name{font-size:13px;font-weight:600;color:var(--gray-900)}
.collab-setor{font-size:11px;color:var(--gray-600);margin-top:1px}
.equip-list{padding:8px 16px}
.equip-item{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--gray-100)}
.equip-item:last-child{border-bottom:none}
.equip-tipo{font-size:12px;color:var(--gray-600);display:flex;align-items:center;gap:6px}
.equip-tipo i{font-size:14px}
.equip-pat{font-size:12px;font-weight:500;color:var(--gray-800);font-family:monospace}

/* ANIVERSÁRIOS */
.aniv-mes-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:16px}
.mes-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--white);font-size:12px;font-weight:500;color:var(--gray-600);cursor:pointer;transition:all .15s}
.mes-btn:hover{background:var(--gray-100)}
.mes-btn.active{background:var(--brand);border-color:var(--brand);color:#fff}
.mes-btn.tem-data{border-color:var(--brand);color:var(--brand)}
.mes-btn.tem-data.active{background:var(--brand);color:#fff}
.aniv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.aniv-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;display:flex;align-items:center;gap:12px}
.aniv-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.aniv-nome{font-size:13px;font-weight:600;color:var(--gray-900)}
.aniv-info{font-size:12px;color:var(--gray-600);margin-top:2px}
.aniv-anos{font-size:11px;font-weight:600;margin-top:4px}

/* RAMAIS */
.ramal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.ramal-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;display:flex;align-items:center;gap:12px}
.ramal-num{font-size:22px;font-weight:700;color:var(--brand);font-family:monospace;min-width:52px}
.ramal-nome{font-size:13px;font-weight:600;color:var(--gray-900)}
.ramal-login{font-size:11px;color:var(--gray-500);margin-top:2px;word-break:break-all}

.timeline-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--gray-100)}
.timeline-item:last-child{border-bottom:none}
.timeline-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px}
.timeline-content{flex:1}
.timeline-title{font-size:13px;font-weight:500;color:var(--gray-900)}
.timeline-sub{font-size:12px;color:var(--gray-600);margin-top:2px}
.timeline-date{font-size:11px;color:var(--gray-400);margin-top:3px}

.loading{text-align:center;padding:40px;color:var(--gray-400)}
.loading i{font-size:28px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;right:24px;background:var(--gray-900);color:#fff;padding:12px 18px;border-radius:var(--radius);font-size:13px;font-weight:500;z-index:999;display:none;align-items:center;gap:8px}
.toast.show{display:flex}
.toast.success{background:var(--green)}
.toast.error{background:var(--danger)}
.empty-state{text-align:center;padding:48px 20px;color:var(--gray-400)}
.empty-state i{font-size:40px;margin-bottom:10px;display:block}
</style>
</head>

function fmtDate(d){if(!d)return'—';return new Date(d+'T00:00:00').toLocaleDateString('pt-BR')}
function fmtDateTime(d){if(!d)return'—';return new Date(d).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})}
function showToast(msg,type='success'){const t=document.getElementById('toast');t.className='toast show '+type;t.innerHTML='<i class="ti '+(type==='success'?'ti-check':'ti-alert-circle')+'"></i> '+msg;setTimeout(()=>t.className='toast',3200)}
function openModal(id){document.getElementById(id).classList.add('open')}
function closeModal(id){document.getElementById(id).classList.remove('open')}
function avClass(setor){return setor==='CS'?'av-cs':setor==='Suporte e CS'?'av-suporteecs':'av-suporte'}
function avatarHtml(c,extraStyle){
  const style=extraStyle||'';
  if(c.foto_url)return`<div class="avatar" style="padding:0;overflow:hidden;${style}"><img src="${c.foto_url}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none';this.parentElement.classList.add('${avClass(c.setor)}');this.parentElement.textContent='${initials(c.nome)}'"></div>`;
  return`<div class="avatar ${avClass(c.setor)}" style="${style}">${initials(c.nome)}</div>`;
}
function setorKey(setor){return setor==='CS'?'cs':setor==='Suporte e CS'?'suporte-cs':'suporte'}

// ── EXPORTAÇÃO CSV ───────────────────────────────────────────────────────
function exportCSV(filename,headers,rows){
  const esc=v=>{
    const s=(v===null||v===undefined)?'':String(v);
    return /[";\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;
  };
  const lines=[headers.map(esc).join(';'),...rows.map(r=>r.map(esc).join(';'))];
  const csv='\uFEFF'+lines.join('\r\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=filename;document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Exportado!');
}
function exportColaboradoresCSV(){
  const headers=['Nome','Código','Cargo','Setor','Login','Ramal','Data de admissão','Aniversário'];
  const rows=colaboradores.filter(c=>c.ativo).map(c=>[c.nome,c.codigo||'',c.cargo||'',c.setor,c.login||'',c.ramal||'',fmtDate(c.data_admissao),fmtDate(c.data_aniversario)]);
  exportCSV('colaboradores.csv',headers,rows);
}
function exportEquipamentosCSV(){
  const headers=['Tipo','Patrimônio','Status','Colaborador atual','Setor do colaborador'];
  const rows=equipamentos.map(e=>[e.tipo,e.patrimonio,e.status,e.colaborador_atual?.nome||'',e.colaborador_atual?.setor||'']);
  exportCSV('equipamentos.csv',headers,rows);
}
function exportHistoricoCSV(){
  const headers=['Data','Tipo','Patrimônio','Equipamento','Origem','Destino','Motivo','Registrado por'];
  const rows=movimentacoes.map(m=>[fmtDateTime(m.data_movimentacao),m.tipo_movimentacao,m.equipamento?.patrimonio||'',m.equipamento?.tipo||'',m.origem?.nome||m.colaborador_origem_nome||'',m.destino?.nome||m.colaborador_destino_nome||'',m.motivo||'',m.registrado_por]);
  exportCSV('historico-movimentacoes.csv',headers,rows);
}
function exportRamaisCSV(){
  const headers=['Nome','Ramal','Login','Setor'];
  const rows=colaboradores.filter(c=>c.ativo&&c.ramal).sort((a,b)=>a.ramal-b.ramal).map(c=>[c.nome,c.ramal,c.login||'',c.setor]);
  exportCSV('ramais.csv',headers,rows);
}

function calcAnos(dataStr){
  if(!dataStr)return null;
  const hoje=new Date();
  const d=new Date(dataStr+'T00:00:00');
  let anos=hoje.getFullYear()-d.getFullYear();
  const m=hoje.getMonth()-d.getMonth();
  if(m<0||(m===0&&hoje.getDate()<d.getDate()))anos--;
  return anos;
}

let currentSection='resumo';
let colaboradores=[],equipamentos=[],movimentacoes=[];
let colabFotoFile=null;

async function loadAll(){
  [colaboradores,equipamentos,movimentacoes]=await Promise.all([
    api('colaboradores?select=*&order=data_admissao,nome'),
    api('equipamentos?select=*,colaborador_atual:colaboradores(id,nome,setor)&order=tipo,patrimonio'),
    api('movimentacoes?select=*,equipamento:equipamentos(tipo,patrimonio),origem:colaboradores!movimentacoes_colaborador_origem_id_fkey(nome),destino:colaboradores!movimentacoes_colaborador_destino_id_fkey(nome)&order=data_movimentacao.desc&limit=300')
  ]);
}

function navigate(section){
  currentSection=section;
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.classList.toggle('active',el.getAttribute('onclick').includes("'"+section+"'"));
  });
  const titles={resumo:'Resumo por pessoa',equipamentos:'Equipamentos',movimentar:'Movimentar equipamento',historico:'Histórico de movimentações',colaboradores:'Colaboradores',aniversarios:'Aniversários',empresa:'Tempo de empresa',ramais:'Ramais / Yaestar'};
  document.getElementById('topbar-title').textContent=titles[section];
  render(section);
}

async function render(section){
  const content=document.getElementById('content');
  const actions=document.getElementById('topbar-actions');
  content.innerHTML='<div class="loading"><i class="ti ti-refresh"></i><p style="margin-top:12px">Carregando...</p></div>';
  actions.innerHTML='';
  try{
    await loadAll();
    if(section==='resumo')renderResumo();
    else if(section==='equipamentos')renderEquipamentos();
    else if(section==='movimentar')renderMovimentar();
    else if(section==='historico')renderHistorico();
    else if(section==='colaboradores')renderColaboradores();
    else if(section==='aniversarios')renderAniversarios();
    else if(section==='empresa')renderEmpresa();
    else if(section==='ramais')renderRamais();
  }catch(e){
    content.innerHTML='<div class="empty-state"><i class="ti ti-wifi-off"></i><p>Erro ao conectar: '+e.message+'</p></div>';
  }
}

function getAniversariantesHoje(){
  const hoje=new Date();
  return colaboradores.filter(c=>c.ativo&&c.data_aniversario).filter(c=>{
    const d=new Date(c.data_aniversario+'T00:00:00');
    return d.getDate()===hoje.getDate()&&d.getMonth()===hoje.getMonth();
  });
}
function getAniversariantesMes(){
  const hoje=new Date();
  return colaboradores.filter(c=>c.ativo&&c.data_aniversario).filter(c=>new Date(c.data_aniversario+'T00:00:00').getMonth()===hoje.getMonth())
    .sort((a,b)=>new Date(a.data_aniversario+'T00:00:00').getDate()-new Date(b.data_aniversario+'T00:00:00').getDate());
}

      </div>
    </div>
    <div class="card" style="padding:16px">
      <div style="font-size:11px;color:var(--gray-500);font-weight:700;text-transform:uppercase;letter-spacing:.4px">Equipamentos</div>

      <div style="display:flex;height:8px;border-radius:4px;overflow:hidden;margin-top:12px;background:var(--gray-100)">${barraStatus}</div>
      <div style="display:flex;gap:10px;margin-top:8px;flex-wrap:wrap">${legendaStatus}</div>

function renderAnivMes(content, mesIdx, tipo){
  const campo=tipo==='aniv'?'data_aniversario':'data_admissao';
  const titulo=tipo==='aniv'?'Aniversários':'Tempo de empresa';

  // botões de mês
  const botoes=MESES.map((m,i)=>{
    const temDados=colaboradores.filter(c=>c.ativo&&c[campo]).some(c=>new Date(c[campo]+'T00:00:00').getMonth()===i);
    return`<button class="mes-btn ${temDados?'tem-data':''} ${i===mesIdx?'active':''}" onclick="selecionarMes(${i},'${tipo}')">${m.substring(0,3)}</button>`;
  }).join('');

  const doMes=colaboradores.filter(c=>c.ativo&&c[campo]&&new Date(c[campo]+'T00:00:00').getMonth()===mesIdx)
    .sort((a,b)=>new Date(a[campo]+'T00:00:00').getDate()-new Date(b[campo]+'T00:00:00').getDate());

  const emojiAniv=['🎂','🎉','🎊','🥳','🎈'];

  const cards=doMes.length===0
    ?`<div class="empty-state" style="grid-column:1/-1"><i class="ti ti-calendar-off"></i><p>Nenhum ${tipo==='aniv'?'aniversário':'aniversário de empresa'} em ${MESES[mesIdx]}</p></div>`
    :doMes.map((c,idx)=>{
      const d=new Date(c[campo]+'T00:00:00');
      const dia=String(d.getDate()).padStart(2,'0');
      const anos=tipo==='empresa'?calcAnos(c[campo]):null;
      const bgAniv=tipo==='aniv'?'background:#fff9db':'background:#e8f5ee';
      const corAniv=tipo==='aniv'?'color:#e67700':'color:#1a7a4a';
      return`<div class="aniv-card">
        <div class="aniv-icon" style="${bgAniv};${corAniv}">${tipo==='aniv'?emojiAniv[idx%5]:'🏆'}</div>
        <div style="flex:1">
          <div class="aniv-nome">${c.nome}</div>
          <div class="aniv-info">${c.cargo||c.setor} · dia ${dia}</div>
          ${anos!==null?`<div class="aniv-anos" style="${corAniv}">${anos} ${anos===1?'ano':'anos'} de empresa</div>`:''}
        </div>
        <div style="text-align:right">
          <div style="font-size:22px;font-weight:700;${corAniv};font-family:monospace">${dia}</div>
          <div style="font-size:10px;color:var(--gray-400)">${MESES[mesIdx].substring(0,3)}</div>
        </div>
      </div>`;
    }).join('');

  content.innerHTML=`
    <div class="aniv-mes-tabs" id="aniv-tabs">${botoes}</div>
    <div style="margin-bottom:12px;font-size:13px;color:var(--gray-600)">
      <strong style="color:var(--gray-900)">${doMes.length}</strong> ${tipo==='aniv'?'aniversariante':'colaborador com aniversário de empresa'} em <strong>${MESES[mesIdx]}</strong>
    </div>
    <div class="aniv-grid">${cards}</div>`;
}

// ── CRUD ──────────────────────────────────────────────────────────────────
function resizeImageFile(file,maxSize=500,quality=0.9){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onerror=()=>reject(new Error('Erro ao ler a imagem'));
    reader.onload=e=>{
      const img=new Image();
      img.onerror=()=>reject(new Error('Arquivo de imagem inválido'));
      img.onload=()=>{
        const side=Math.min(img.width,img.height);
        const sx=(img.width-side)/2, sy=(img.height-side)/2;
        const size=Math.min(maxSize,side);
        const canvas=document.createElement('canvas');
        canvas.width=size;canvas.height=size;
        const ctx=canvas.getContext('2d');
        ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality='high';
        ctx.drawImage(img,sx,sy,side,side,0,0,size,size);
        canvas.toBlob(blob=>blob?resolve(blob):reject(new Error('Erro ao processar imagem')),'image/jpeg',quality);
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}
async function previewColabFoto(evt){
  const file=evt.target.files[0];if(!file)return;
  try{
    const resized=await resizeImageFile(file);
    colabFotoFile=resized;
    const url=URL.createObjectURL(resized);
    document.getElementById('colab-foto-preview').innerHTML=`<img src="${url}" style="width:100%;height:100%;object-fit:cover">`;
  }catch(err){
    showToast(err.message||'Não foi possível processar a imagem','error');
  }
}
function resetColabFotoPreview(url){
  colabFotoFile=null;
  document.getElementById('colab-foto-file').value='';
  document.getElementById('colab-foto-preview').innerHTML=url?`<img src="${url}" style="width:100%;height:100%;object-fit:cover">`:'<i class="ti ti-user" style="font-size:26px;color:var(--gray-400)"></i>';
}
async function uploadColabFoto(file,colabId){
  const path=`colab-${colabId||'novo'}-${Date.now()}.jpg`;
  const res=await fetch(`${SB_URL}/storage/v1/object/fotos-colaboradores/${path}`,{
    method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'image/jpeg'},body:file
  });
  if(!res.ok){const e=await res.json().catch(()=>({message:'Erro ao enviar foto'}));throw new Error(e.message||'Erro ao enviar foto. Verifique se o bucket "fotos-colaboradores" existe e é público no Supabase Storage.');}
  return `${SB_URL}/storage/v1/object/public/fotos-colaboradores/${path}`;
}

  ['colab-id','colab-nome','colab-codigo','colab-cargo','colab-login','colab-ramal','colab-admissao','colab-aniversario'].forEach(id=>document.getElementById(id).value='');

async function deleteColaborador(id){
  const c=colaboradores.find(x=>x.id===id);if(!c)return;
  const equipVinculados=equipamentos.filter(e=>e.colaborador_atual_id===id);
  const movVinculadas=movimentacoes.filter(m=>m.colaborador_origem_id===id||m.colaborador_destino_id===id);
  let msg=`Tem certeza que deseja excluir este colaborador?\n\n${c.nome}`;
  if(equipVinculados.length>0)msg+=`\n\nEste colaborador possui ${equipVinculados.length} equipamento(s) alocado(s). Eles serão desvinculados automaticamente (ficarão como "Disponível").`;
  if(movVinculadas.length>0)msg+=`\n\nEste colaborador aparece em ${movVinculadas.length} movimentação(ões) registrada(s). O nome dele será removido desses registros, mas o histórico do equipamento será mantido.`;
  if(!confirm(msg))return;
  try{
    if(equipVinculados.length>0){
      await Promise.all(equipVinculados.map(e=>api('equipamentos?id=eq.'+e.id,'PATCH',{colaborador_atual_id:null,status:'disponível'})));
      equipVinculados.forEach(e=>{e.colaborador_atual_id=null;e.status='disponível';});
    }
    if(movVinculadas.length>0){
      await Promise.all(movVinculadas.map(m=>{
        const patch={};
        if(m.colaborador_origem_id===id){patch.colaborador_origem_id=null;patch.colaborador_origem_nome=c.nome;}
        if(m.colaborador_destino_id===id){patch.colaborador_destino_id=null;patch.colaborador_destino_nome=c.nome;}
        return api('movimentacoes?id=eq.'+m.id,'PATCH',patch);
      }));
      movVinculadas.forEach(m=>{
        if(m.colaborador_origem_id===id){m.colaborador_origem_id=null;m.colaborador_origem_nome=c.nome;}
        if(m.colaborador_destino_id===id){m.colaborador_destino_id=null;m.colaborador_destino_nome=c.nome;}
      });
    }
    await api('colaboradores?id=eq.'+id,'DELETE');
    colaboradores=colaboradores.filter(x=>x.id!==id);
    showToast('Colaborador excluído!');render(currentSection);
  }catch(e){
    if((e.message||'').toLowerCase().includes('foreign key')||(e.message||'').toLowerCase().includes('violates')){
      showToast('Não foi possível excluir: colaborador ainda possui vínculos em outra tabela não tratada.','error');
    }else{
      showToast(e.message,'error');
    }
  }
}
async function saveColaborador(){
  const id=document.getElementById('colab-id').value;
  const data={nome:document.getElementById('colab-nome').value.trim(),setor:document.getElementById('colab-setor').value,codigo:document.getElementById('colab-codigo').value.trim()||null,cargo:document.getElementById('colab-cargo').value.trim()||null,login:document.getElementById('colab-login').value.trim()||null,ramal:document.getElementById('colab-ramal').value.trim()||null,data_admissao:document.getElementById('colab-admissao').value||null,data_aniversario:document.getElementById('colab-aniversario').value||null};
  if(!data.nome)return showToast('Preencha o nome','error');
  try{
    if(colabFotoFile){
      data.foto_url=await uploadColabFoto(colabFotoFile,id);
    }
    if(id)await api('colaboradores?id=eq.'+id,'PATCH',data);
    else await api('colaboradores','POST',data);
    closeModal('modal-colaborador');showToast(id?'Atualizado!':'Cadastrado!');render(currentSection);
    colabFotoFile=null;
  }catch(e){showToast(e.message,'error')}
}

async function saveEquipamento(){

  const data={tipo:document.getElementById('equip-tipo').value,patrimonio:document.getElementById('equip-patrimonio').value.trim(),descricao:document.getElementById('equip-descricao').value.trim()||null,status:document.getElementById('equip-status').value,colaborador_atual_id:colabId||null};

  try{
    if(id)await api('equipamentos?id=eq.'+id,'PATCH',data);
    else await api('equipamentos','POST',data);
    closeModal('modal-equipamento');showToast(id?'Atualizado!':'Cadastrado!');render(currentSection);
  }catch(e){showToast(e.message,'error')}
}

async function saveMovimentacao(){
  const equipId=document.getElementById('mov-eq').value;
  const origemId=document.getElementById('mov-ori').value;
  const destinoId=document.getElementById('mov-dst').value;
  const tipo=document.getElementById('mov-tip').value;
  const responsavel=document.getElementById('mov-resp').value.trim();
  const motivo=document.getElementById('mov-mot').value.trim();
  if(!equipId)return showToast('Selecione o equipamento','error');
  if(!responsavel)return showToast('Informe quem está registrando','error');
  try{
    const origemColabId=(origemId&&origemId!=='RH')?origemId:null;
    const destinoColabId=(destinoId&&destinoId!=='RH')?destinoId:null;
    await api('movimentacoes','POST',{
      equipamento_id:equipId,
      colaborador_origem_id:origemColabId,
      colaborador_origem_nome:origemId==='RH'?'RH':null,
      colaborador_destino_id:destinoColabId,
      colaborador_destino_nome:destinoId==='RH'?'RH':null,
      tipo_movimentacao:tipo,registrado_por:responsavel,motivo:motivo||null
    });
    const novoStatus=tipo==='Manutenção'?'manutenção':tipo==='Baixa'?'baixado':(destinoColabId?'alocado':'disponível');
    await api('equipamentos?id=eq.'+equipId,'PATCH',{colaborador_atual_id:destinoColabId,status:novoStatus});
    showToast('Movimentação registrada!');render('movimentar');
  }catch(e){showToast(e.message,'error')}
}
